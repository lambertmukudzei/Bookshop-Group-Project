<!DOCTYPE html>
<html>
<head>
    <title>Inline CSS Example</title>
</head>
<body>

<p style="font-style: italic; font-size: 20px;">
    This paragraph is italic and has width 20px
</p>

<p style="text-decoration: underline; width: 120px;">
    This paragraph is underlined and has width 120px
</p>

<p style="font-weight: bold; width: 200px;">
    This paragraph is bold and has width 200px
</p>

</body>
</html>
